campaigner_settings:
  name: "Bump fabric-envoy image"
  owner: "Fabric Gateways"
  slack_channel: "fabric-gateways-ops-commentary"
  description: "bump fabric-envoy image"
  manual_refresh: false
  make_edits: true
  draft: false
  allow_automerge: true
github:
  repos:
    - repo: service-discovery-platform
      branch: main
    - repo: dd-go
      branch: prod
  pull_request:
    branch_name: "sdp-campaigner/fabric-envoy"
    use_existing_branch: true
    title: "engraver: bump fabric-envoy image"
    description: |
      This PR got generated by a campaign and updates the fabric-envoy image tag used by all Gateways.

      from https://gitlab.ddbuild.io/DataDog/envoy-private/-/pipelines/{{ .Env.CI_PIPELINE_ID}}
      **Please review the changes and merge the PR if everything looks good.**
    default_commit_msg: | 
      bump fabric-envoy image
      from https://gitlab.ddbuild.io/DataDog/envoy-private/-/pipelines/{{ .Env.CI_PIPELINE_ID}}
file_patterns:
  root: .
  regex: ["engraver_versions.yaml"]
changes:
{{- range $name, $spec := (ds "data") }}
{{- range $field, $value := $spec }}
  - op: "misc/images"
    name: "{{ $name }}"
    key: "{{ $field }}"
    value: "{{ $value }}"
{{- end }}
{{ end }}
